
# ── Trading Bot — Settings Template ──────────────────────────────────────────
#
# Copy this file to config/settings.yaml and fill in your values.
# config/settings.yaml is gitignored and never committed.
#
#   cp config/settings_template.yaml config/settings.yaml
#
# For Alpaca live paper trading (recommended — free, no IBKR required):
#   export ALPACA_API_KEY="PKxxxxxxxxxxxxxxxx"
#   export ALPACA_API_SECRET="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
#   python3 fetch_alpaca_data.py      # download 2-year bar history
#   python3 main.py alpaca            # run live paper monitor
#
# For IBKR paper trading (requires TWS/IB Gateway running locally):
#   python3 main.py paper -s event_driven -i 15m
# ─────────────────────────────────────────────────────────────────────────────

broker:
  host: "127.0.0.1"
  port: 7497          # 7497 for TWS paper, 4002 for IB Gateway paper
  client_id: 1
  account: ""         # Your IBKR paper account ID (e.g., DU1234567)
  timeout: 30

data:
  cache_dir: "./data/cache"
  default_bar_size: "15 min"
  default_lookback: "2 Y"

trading:
  mode: "paper"        # paper | simulate | backtest
  asset_type: "STK"
  universe:
    - "AAPL"
    - "NVDA"
    - "MSFT"
    - "AMZN"
    - "GOOG"
    - "TSLA"
    - "META"
    - "AMD"
    - "AVGO"
    - "NFLX"
  base_currency: "USD"

risk:
  max_position_pct: 0.20
  max_portfolio_leverage: 1.0
  max_daily_drawdown_pct: 0.02
  max_total_drawdown_pct: 0.10
  max_open_orders: 10

backtest:
  initial_capital: 10000.0           # starting equity for backtests
  commission_per_share: 0.005        # IBKR tiered approx; use 0.0 for Alpaca sim
  min_commission: 1.0
  slippage_pct: 0.001                # 0.1% slippage per entry
  start_date: "2024-01-01"
  end_date:   "2025-12-31"

strategies:
  event_driven:
    # ── Symbol universe ──────────────────────────────────────────────────────
    symbols:
      - "AAPL"
      - "NVDA"
      - "MSFT"
      - "AMZN"
      - "GOOG"
      - "TSLA"
      - "META"
      - "AMD"
      - "AVGO"
      - "NFLX"

    # ── SWEEP_HQ (Session Sweep + Rejection — NVDA only, 4/4 WF pass) ────────
    sweep_hq_enabled: true

    # ── ORBFAIL_REGIME (ORB Failure Fade — gap-up days, 4/4 WF pass) ─────────
    orbfail_enabled: true
    gap_threshold: 0.002             # minimum gap % to qualify (default 0.2%)
    fail_window: 6                   # bars after ORB BO to wait for failure

    # ── SWEEP_PRIMARY (PDL long + prior_up + near_extreme, 2/4 MARGINAL) ──────
    sweep_primary_enabled: true
    rvol_threshold_sweep: 1.0        # min relative volume for SWEEP_PRIMARY

    # ── Shared risk ──────────────────────────────────────────────────────────
    orb_minutes: 15                  # opening range = first 15-min bar
    atr_period: 14

logging:
  level: "INFO"
  log_file: "./logs/quantbot.log"
  rotation: "10 MB"

dashboard:
  host: "127.0.0.1"
  port: 8501
  refresh_interval: 30
